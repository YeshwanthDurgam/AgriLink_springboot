# Development profile using H2 in-memory database
server:
  port: 8084

spring:
  application:
    name: marketplace-service
  
  datasource:
    url: jdbc:h2:mem:agrilink_marketplace;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET:myVeryLongAndSecureSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}

logging:
  level:
    com.agrilink: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,h2-console

market:
  data:
    datagov:
      base-url: ${DATAGOV_BASE_URL:https://api.data.gov.in/resource}
      api-key: ${DATAGOV_API_KEY:}
      resource-id: ${DATAGOV_RESOURCE_ID:}
    price-sync:
      enabled: ${MARKET_PRICE_SYNC_ENABLED:true}
      fixed-delay-ms: ${MARKET_PRICE_SYNC_DELAY_MS:21600000}
      initial-delay-ms: ${MARKET_PRICE_SYNC_INITIAL_DELAY_MS:120000}
      page-size: ${MARKET_PRICE_SYNC_PAGE_SIZE:150}
