# =====================================================
# Marketplace Service - Neon Database Configuration
# =====================================================
# Activate this profile by setting: SPRING_PROFILES_ACTIVE=neon
# Or run with: --spring.profiles.active=neon

server:
  port: 8084

spring:
  application:
    name: marketplace-service

  datasource:
    # Neon Database Connection URL
    url: ${NEON_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agrilink_marketplace?sslmode=require&currentSchema=marketplace_schema}
    username: ${NEON_DATASOURCE_USERNAME:neondb_owner}
    password: ${NEON_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

    # HikariCP Connection Pool Configuration (optimized for serverless)
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
      pool-name: MarketplaceServicePool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: marketplace_schema
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: marketplace_schema
    default-schema: marketplace_schema

jwt:
  secret: ${JWT_SECRET:myVeryLongAndSecureSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong}

# Inter-service communication
user:
  service:
    url: ${USER_SERVICE_URL:http://localhost:8082}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}

logging:
  level:
    com.agrilink: INFO
    org.springframework.security: WARN
    com.zaxxer.hikari: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

market:
  data:
    datagov:
      base-url: ${DATAGOV_BASE_URL:https://api.data.gov.in/resource}
      api-key: ${DATAGOV_API_KEY:}
      resource-id: ${DATAGOV_RESOURCE_ID:}
    price-sync:
      enabled: ${MARKET_PRICE_SYNC_ENABLED:true}
      fixed-delay-ms: ${MARKET_PRICE_SYNC_DELAY_MS:21600000}
      initial-delay-ms: ${MARKET_PRICE_SYNC_INITIAL_DELAY_MS:120000}
      page-size: ${MARKET_PRICE_SYNC_PAGE_SIZE:150}
