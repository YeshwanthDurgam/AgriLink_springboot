server:
  port: 8084

spring:
  application:
    name: marketplace-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agrilink_marketplace}?sslmode=${DB_SSLMODE:disable}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    # HikariCP Connection Pool settings
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: MarketplacePool
      max-lifetime: 1800000
      connection-timeout: 10000
      keepalive-time: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:myVeryLongAndSecureSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong}

# Inter-service communication
user:
  service:
    url: ${USER_SERVICE_URL:http://localhost:8082}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}

logging:
  level:
    com.agrilink: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

market:
  data:
    datagov:
      base-url: ${DATAGOV_BASE_URL:https://api.data.gov.in/resource}
      api-key: ${DATAGOV_API_KEY:}
      resource-id: ${DATAGOV_RESOURCE_ID:}
    price-sync:
      enabled: ${MARKET_PRICE_SYNC_ENABLED:true}
      fixed-delay-ms: ${MARKET_PRICE_SYNC_DELAY_MS:21600000}
      initial-delay-ms: ${MARKET_PRICE_SYNC_INITIAL_DELAY_MS:120000}
      page-size: ${MARKET_PRICE_SYNC_PAGE_SIZE:150}
