# =====================================================
# Auth Service - Neon Database Configuration
# =====================================================
# Activate this profile by setting: SPRING_PROFILES_ACTIVE=neon
# Or run with: --spring.profiles.active=neon

server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    # Neon Database Connection URL
    url: ${NEON_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agrilink_auth?sslmode=require&currentSchema=auth_schema}
    username: ${NEON_DATASOURCE_USERNAME:neondb_owner}
    password: ${NEON_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

    # HikariCP Connection Pool Configuration (optimized for serverless)
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
      pool-name: AuthServicePool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: auth_schema
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: auth_schema
    default-schema: auth_schema
    validate-on-migrate: false

jwt:
  secret: ${JWT_SECRET:myVeryLongAndSecureSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.agrilink: INFO
    org.springframework.security: WARN
    com.zaxxer.hikari: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
