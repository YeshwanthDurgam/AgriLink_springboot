server:
  port: 8082

spring:
  application:
    name: user-service
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agrilink_user}
    username: ${SPRING_DATASOURCE_USERNAME:agrilink}
    password: ${SPRING_DATASOURCE_PASSWORD:agrilink123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:myVeryLongAndSecureSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong}

logging:
  level:
    com.agrilink: DEBUG

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
