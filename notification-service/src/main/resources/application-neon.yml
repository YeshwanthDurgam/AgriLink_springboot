# =====================================================
# Notification Service - Neon Database Configuration
# =====================================================
# Activate this profile by setting: SPRING_PROFILES_ACTIVE=neon
# Or run with: --spring.profiles.active=neon

server:
  port: 8087

spring:
  application:
    name: notification-service

  datasource:
    # Neon Database Connection URL
    url: ${NEON_DB_URL:}
    username: ${NEON_DB_USER:}
    password: ${NEON_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

    # HikariCP Connection Pool Configuration (optimized for serverless)
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
      pool-name: NotificationServicePool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: notification_schema
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: notification_schema
    default-schema: notification_schema

  # Email Configuration - Gmail SMTP (SSL on port 465)
  mail:
    host: smtp.gmail.com
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          connectiontimeout: 30000
          timeout: 30000
          writetimeout: 30000

  # Thymeleaf Configuration for Email Templates
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000

# Logging
logging:
  level:
    com.agrilink: INFO
    org.springframework.security: WARN
    com.zaxxer.hikari: INFO

# Notification Settings
notification:
  retry:
    enabled: true
    max-retries: 5
    interval-ms: 60000
  email:
    from: ${NOTIFICATION_EMAIL_FROM:no-reply@agrilink.local}
    from-name: ${NOTIFICATION_EMAIL_FROM_NAME:AgriLink}
    enabled: true
    provider: ${NOTIFICATION_EMAIL_PROVIDER:brevo}
    brevo:
      api-key: ${BREVO_API_KEY:}
  sms:
    enabled: false
    provider: ${NOTIFICATION_SMS_PROVIDER:textbelt}
    textbelt:
      key: ${TEXTBELT_KEY:textbelt_test}
  push:
    enabled: false

  security:
    allow-unauthenticated-internal-endpoints: ${NOTIFICATION_ALLOW_UNAUTH_INTERNAL_ENDPOINTS:false}
    enable-test-endpoints: ${NOTIFICATION_ENABLE_TEST_ENDPOINTS:false}

websocket:
  allowed-origin-patterns: ${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

# Microservice URLs
user:
  service:
    url: ${USER_SERVICE_URL:http://localhost:8082}
